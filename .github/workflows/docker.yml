name: docker-publish

on:
  workflow_dispatch:
    inputs:
      source_version:
        description: '请输入上游 XrayR 镜像版本号，例如 v0.9.5-20260409'
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          source_version='${{ inputs.source_version }}'
          release_version="${source_version%%-*}"
          if [ -z "$release_version" ] || [ "$release_version" = "$source_version" ]; then
            echo "Invalid source_version: $source_version"
            exit 1
          fi
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
          push: true
          build-args: |
            TAG=${{ inputs.source_version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/xrayr:${{ steps.version.outputs.release_version }}
            ghcr.io/${{ github.repository_owner }}/xrayr:latest
